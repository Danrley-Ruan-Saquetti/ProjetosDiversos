<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Formulário</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <h1>Formulário</h1>
    <form>
        <div class="inputBox">
            <input type="text" name="nome" id="inputNome" required>
            <label for="inputNome">Nome:</label>
        </div>
        <div class="inputBox">
            <input type="password" name="password" id="inputSenha" required>
            <label for="inputSenha">Senha:</label>
        </div>
        <div class="inputBox">
            <input type="submit" id="inputSubmit" value="Enviar">
        </div>
    </form>
</body>

</html>
